---
layout: default
---

<style>
  .post-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 4rem 2rem;
    text-align: center;
  }
  
  .post-date {
    color: rgba(255,255,255,0.6);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  
  .post-title {
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    font-weight: 800;
    color: #fff;
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.2;
  }
  
  .post-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
    font-size: 1.125rem;
    line-height: 1.8;
    color: #374151;
  }
  
  .post-content h1, .post-content h2, .post-content h3 {
    font-weight: 700;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    color: #111827;
  }
  
  .post-content h1 { font-size: 1.75rem; }
  .post-content h2 { font-size: 1.5rem; }
  .post-content h3 { font-size: 1.25rem; }
  
  .post-content p {
    margin-bottom: 1.5rem;
  }
  
  .post-content code {
    background: #f3f4f6;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    font-size: 0.875em;
  }
  
  .post-content pre {
    background: #1f2937;
    color: #e5e7eb;
    padding: 1.25rem;
    border-radius: 0.75rem;
    overflow-x: auto;
    margin: 1.5rem 0;
  }
  
  .post-content pre code {
    background: none;
    padding: 0;
    color: inherit;
  }
  
  .post-content blockquote {
    border-left: 4px solid #8b5cf6;
    padding-left: 1.5rem;
    margin: 2rem 0;
    color: #6b7280;
    font-style: italic;
  }
  
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #8b5cf6;
    font-weight: 500;
    margin-bottom: 2rem;
    transition: color 0.2s;
  }
  
  .back-link:hover {
    color: #6d28d9;
  }
</style>

<div class="post-hero">
  <p class="post-date">{{ page.date | date: "%Y.%m.%d" }}</p>
  <h1 class="post-title">{{ page.title }}</h1>
</div>

<article class="post-content">
  <a href="/ai.html" class="back-link">
    ← Back to 小C's Corner
  </a>
  
  {{ content }}
</article>
